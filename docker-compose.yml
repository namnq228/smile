services:
  smile:
    container_name: smile
    # CI/CD tự cập nhật IMAGE bằng biến môi trường
    # Mặc định build local nếu không có IMAGE
    image: ${IMAGE:-smile:local}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    env_file:
      - path: .env
        required: false

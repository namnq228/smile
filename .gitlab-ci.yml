stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  IMAGE_TAG: latest
  IMAGE_NAME: simle
  CONTAINER_NAME: simle

build:
  stage: build
  image: docker:24
  services:
    - docker:dind
  before_script:
    - echo "🔐 Đăng nhập GitLab Registry..."
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
  script:
    - echo "🏗️ Build và push image bằng docker-compose..."
    # build image theo docker-compose.yml
    - docker-compose build
    # tag lại image theo GitLab Registry
    - docker tag ${IMAGE_NAME}:latest $CI_REGISTRY_IMAGE:${IMAGE_TAG}
    - docker push $CI_REGISTRY_IMAGE:${IMAGE_TAG}
  only:
    - main

deploy:
  stage: deploy
  image: alpine:latest
  script:
    - echo "🚀 Giả lập deploy (ở đây bạn có thể SSH đến server để pull image mới)"
  only:
    - main

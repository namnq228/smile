name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  # docker.io/<DOCKERHUB_USERNAME>/smile — thay DOCKERHUB_USERNAME bằng username Docker Hub của bạn
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/smile

jobs:
  # ────────────────────────────────────────
  # JOB 1: kiểm tra TypeScript (chạy cả PR lẫn push)
  # ────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit

  # ────────────────────────────────────────
  # JOB 2: build Docker image và push GHCR
  # (chỉ chạy khi push vào main)
  # ────────────────────────────────────────
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: type-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      # packages: write  # không cần khi dùng Docker Hub

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layer giữa các lần build → nhanh hơn đáng kể
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ────────────────────────────────────────
  # JOB 3: SSH vào server và deploy
  # (chạy sau khi image đã push thành công)
  # ────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-push
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      vars.ENABLE_DEPLOY == 'true'

    environment:
      name: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     ${{ secrets.SSH_PORT || 22 }}
          envs:     REGISTRY,IMAGE,GITHUB_ACTOR
          script: |
            # Đăng nhập Docker Hub trên server
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            cd ${{ secrets.DEPLOY_PATH }}

            # Cập nhật IMAGE trong .env của server (tạo nếu chưa có)
            echo "IMAGE=${{ env.IMAGE }}:latest" > .env.deploy

            # Pull image mới và restart
            IMAGE=${{ env.IMAGE }}:latest docker compose pull
            IMAGE=${{ env.IMAGE }}:latest docker compose up -d --remove-orphans

            # Dọn image cũ
            docker image prune -f
